services:
  postgres:
    image: postgres:15-alpine
    container_name: devatlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devatlas
      POSTGRES_PASSWORD: devatlas
      POSTGRES_DB: devatlas
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devatlas']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    container_name: devatlas-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://devatlas:devatlas@postgres:5432/devatlas?schema=public
      NODE_ENV: production
      PORT: 3001
    ports:
      - '3001:3001'
  web:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.web
    container_name: devatlas-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
      NODE_ENV: production
    ports:
      - '3000:3000'

volumes:
  postgres_data:
